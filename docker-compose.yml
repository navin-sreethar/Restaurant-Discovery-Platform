version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: restaurant_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: restaurant_platform
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    # ports removed to avoid clashing with local MySQL
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: restaurant_backend
    environment:
      # Use the container name "db" as the host for MySQL
      - DATABASE_URL=mysql+pymysql://user:password@db:3306/restaurant_platform
      - SECRET_KEY=supersecretkey123
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      # Pass the Gemini API Key down from your host environment variable
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -c "sleep 5 && alembic upgrade head && python seed.py && uvicorn main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: restaurant_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
